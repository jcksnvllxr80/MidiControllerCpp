name: CI

on:
  push:
    branches: [master]
  pull_request:

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Host unit/mock/e2e suite (g++); every push + PR ------------------------
  test:
    name: Host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & run tests
        run: make test            # g++ / make are preinstalled on ubuntu-latest

  # ---- Firmware .uf2 for the Pico 2 W (RP2350); every push + PR ---------------
  firmware:
    name: Firmware build (Pico 2 W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake ninja-build python3
      - name: Install ARM GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1   # known-good arm-none-eabi-gcc/g++ + libstdc++
        with:
          release: '13.3.Rel1'
      - name: Cache Pico SDK
        id: sdk
        uses: actions/cache@v4
        with:
          path: ~/pico-sdk
          key: pico-sdk-2.2.0
      - name: Fetch Pico SDK (on cache miss)
        if: steps.sdk.outputs.cache-hit != 'true'
        run: |
          git clone --branch 2.2.0 --depth 1 https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          # Only the submodules this firmware actually links: USB CDC, WiFi, TCP/mDNS.
          git -C "$HOME/pico-sdk" submodule update --init --depth 1 \
            lib/tinyusb lib/cyw43-driver lib/lwip
      - name: Build firmware (make build)
        env:
          # `make build` defaults PICO_SDK_PATH to $HOME/pico-sdk (where we cloned it).
          CMAKE_GENERATOR: Ninja
        run: make build
      - name: Upload .uf2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: build-pico/midicontroller_pico.uf2
          if-no-files-found: error

  # ---- Release: master only, and only when VERSION names a tag that's new -----
  release:
    name: Release
    needs: [test, firmware]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the tag + GitHub Release
    steps:
      - uses: actions/checkout@v4
      - name: Read VERSION
        id: ver
        run: |
          v="$(tr -d '[:space:]' < VERSION)"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"    >> "$GITHUB_OUTPUT"
      - name: Has this version already been released?
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.ver.outputs.tag }} exists — bump VERSION to cut a new release."
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Download .uf2
        if: steps.check.outputs.new == 'true'
        uses: actions/download-artifact@v4
        with:
          name: firmware-uf2
      - name: Name the .uf2 with the version
        if: steps.check.outputs.new == 'true'
        run: cp midicontroller_pico.uf2 "midicontroller-${{ steps.ver.outputs.tag }}.uf2"
      - name: Create GitHub Release
        if: steps.check.outputs.new == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: midicontroller-${{ steps.ver.outputs.tag }}.uf2
